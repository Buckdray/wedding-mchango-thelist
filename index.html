<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mchango — Arnold & Wedding Fund Command Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#252A34; --deep:#252A34; --teal:#08D9D6; --aqua:#08D9D6; --aqua-soft:#D6F7F6;
  --coral:#FF2E63; --coral-soft:#FFE0E8; --butter:#FF2E63; --butter-soft:#FFE0E8;
  --cream:#EAEAEA; --card:#FFFFFF; --line:#DADADA; --muted:#8A9199; --gold:#FF2E63;
  --shadow:0 1px 3px rgba(37,42,52,.08),0 6px 24px rgba(37,42,52,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--ink);line-height:1.5}
h1,h2,h3{font-weight:600;letter-spacing:-.01em}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
/* layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:#252A34;color:#EAF6F4;flex-shrink:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;transition:width .2s}
.sidebar.collapsed{width:64px}
.sb-brand{padding:20px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{width:34px;height:34px;border-radius:9px;background:#08D9D6;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--deep);flex-shrink:0;font-size:15px}
.sb-brand-txt{font-size:14px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden}
.sb-brand-txt small{display:block;font-size:11px;color:#08D9D6;font-weight:400}
.sidebar.collapsed .sb-brand-txt,.sidebar.collapsed .nav-txt,.sidebar.collapsed .sb-foot{display:none}
.nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;color:#CFE9E6;font-size:13.5px;transition:background .15s;white-space:nowrap;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.07)}
.nav-item.active{background:#08D9D6;color:#252A34;font-weight:600}
.nav-ico{width:20px;text-align:center;flex-shrink:0;font-size:15px}
.nav-badge{margin-left:auto;background:#FF2E63;color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;padding:0 6px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.nav-item.active .nav-badge{background:#252A34;color:#fff}
.sidebar.collapsed .nav-badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;font-size:9px;padding:0 4px}
.sidebar.collapsed .nav-item{position:relative}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#08D9D6}
.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
.burger{font-size:19px;color:var(--deep);padding:4px 8px;border-radius:7px}
.burger:hover{background:var(--cream)}
.topbar h2{font-size:16px;flex:1}
.pill{font-size:11.5px;padding:4px 11px;border-radius:20px;background:var(--aqua-soft);color:var(--deep);font-weight:600}
.who{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:9px}
.who b{color:var(--ink)}
.btn{padding:8px 15px;border-radius:9px;font-size:13px;font-weight:600;transition:all .15s;border:1px solid transparent}
.btn-primary{background:#252A34;color:#fff}
.btn-primary:hover{background:#08D9D6;color:#252A34}
.btn-ghost{background:var(--card);border-color:var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:5px 10px;font-size:12px}
.content{padding:24px 26px;flex:1;max-width:1600px;width:100%;margin:0 auto}
/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border-radius:15px;padding:17px 19px;box-shadow:var(--shadow);border:1px solid var(--line);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--teal))}
.kpi.k-teal{--accent:#08D9D6} .kpi.k-coral{--accent:#FF2E63} .kpi.k-butter{--accent:#FF2E63} .kpi.k-deep{--accent:#252A34}
.kpi-lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.kpi-val{font-size:27px;font-weight:700;margin:5px 0 2px;letter-spacing:-.02em}
.kpi-sub{font-size:11.5px;color:var(--muted)}
.kpi-sub.pos{color:var(--teal)} .kpi-sub.neg{color:var(--coral)}
/* panels */
.panel{background:var(--card);border-radius:15px;padding:19px 21px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:18px}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.panel-h h3{font-size:15px}
.panel-h .sub{font-size:12px;color:var(--muted);font-weight:400}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid-2{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:260px}
.chart-wrap.sm{height:210px}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 11px;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
.tbl th:hover{color:var(--teal)}
.tbl td{padding:9px 11px;border-bottom:1px solid #F3ECDB;vertical-align:middle}
.tbl tr:hover td{background:var(--cream)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tag{font-size:11px;padding:2px 9px;border-radius:12px;font-weight:600;white-space:nowrap;display:inline-block}
.tag-paid{background:var(--aqua-soft);color:var(--deep)}
.tag-partial{background:var(--coral-soft);color:#9E4A28}
.tag-pledged{background:var(--butter-soft);color:#8A6D18}
.tag-none{background:#F0F0EC;color:#888}
.tag-cat{background:#EEF6F5;color:var(--deep);font-size:10.5px}
.controls{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:15px;align-items:center}
.controls input,.controls select{padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:var(--card);color:var(--ink)}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--teal)}
.search{flex:1;min-width:180px}
/* progress */
.prog{height:11px;border-radius:8px;background:#EDE3CE;overflow:hidden;display:flex;margin:8px 0}
.prog i{height:100%;display:block}
.prog .p-paid{background:#08D9D6} .prog .p-part{background:#FF2E63}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
/* login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#252A34,#1A1E26);padding:20px}
.login-card{background:var(--card);border-radius:20px;padding:38px 34px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:56px;height:56px;border-radius:15px;background:#08D9D6;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--deep);font-size:24px;margin-bottom:18px}
.login h1{font-size:21px;margin-bottom:4px}
.login p.sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--cream)}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);background:#fff}
.login .btn-primary{width:100%;padding:12px;font-size:14px;margin-top:6px}
.err{background:var(--coral-soft);color:#9E4A28;padding:9px 12px;border-radius:9px;font-size:12.5px;margin-bottom:14px}
.note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(14,42,40,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:16px}
.modal .field input,.modal .field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:var(--cream)}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.banner{background:var(--butter-soft);border:1px solid var(--butter);border-radius:11px;padding:12px 15px;font-size:12.5px;color:#8A6D18;margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.banner b{color:#6E5612}
.muted{color:var(--muted)} .rt{text-align:right} .center{text-align:center}
.mini{font-size:11px;color:var(--muted)}
.hcard{display:flex;gap:13px;flex-wrap:wrap}
.hcard .hc{flex:1;min-width:130px;background:var(--cream);border-radius:11px;padding:13px 15px;border:1px solid var(--line)}
.hc-v{font-size:19px;font-weight:700}
.hc-l{font-size:11.5px;color:var(--muted)}
@media(max-width:680px){.sidebar{position:fixed;top:0;left:0;z-index:50;height:100vh;box-shadow:8px 0 30px rgba(0,0,0,.2)}.sidebar.collapsed{width:0;min-width:0;overflow:hidden}.content{padding:16px}}
</style>
</head><body>

async function saveGuest(g){
  // New contributor with no position yet -> put them at the bottom (next sort_order).
  // This keeps the list chronological: newest pledges append at the end.
  if(!g.id && (g.sort_order===undefined || g.sort_order===null)){
    const maxSO=Math.max(0,...GUESTS.filter(x=>x.currency===g.currency).map(x=>x.sort_order||0));
    g.sort_order=maxSO+1;
  }
  if(LIVE){
    if(g.id){
      // Postgres 'id' is GENERATED ALWAYS — never send it (or updated_at) in an UPDATE.
      const {id, updated_at, created_at, ...fields}=g;
      const {error}=await sb.from('guests').update(fields).eq('id',g.id); if(error)throw error;
      const i=GUESTS.findIndex(x=>x.id===g.id); if(i>=0) GUESTS[i]=g; }
    else {
      const {id, updated_at, created_at, ...fields}=g;
      const {data,error}=await sb.from('guests').insert(fields).select().single(); if(error)throw error; g.id=data.id; GUESTS.push(Object.assign(g,data)); }
  } else {
    if(g.id){ const i=GUESTS.findIndex(x=>x.id===g.id); GUESTS[i]=g; }
    else { g.id=Math.max(0,...GUESTS.map(x=>x.id))+1; GUESTS.push(g); }
    persist();
  }
}

async function approveSub(id,asPaid){
  const s=SUBMISSIONS.find(x=>x.id===id); if(!s) return;
  const src=s.currency==='TZS'?'WhatsApp-TZ':'WhatsApp-Rwanda';
  const g={name:s.name,category:s.currency==='TZS'?'Uncategorized':'Kigali',handler:s.currency==='TZS'?'':'Dre',
    attending:'',pledged:s.amount,paid:asPaid?s.amount:0,channel:'',source:src,currency:s.currency,phone:s.phone||''};
  try{ await saveGuest(g);
    if(LIVE){ await sb.from('pledge_submissions').update({status:'approved'}).eq('id',id); }
    s.status='approved'; if(!LIVE) localStorage.setItem('mc_subs',JSON.stringify(SUBMISSIONS));
    refreshPendingCount(); buildNav(); document.getElementById('content').innerHTML=viewReview(); toast('Added to '+src+' list'+(asPaid?' as PAID':' as pledged'));
  }catch(e){ toast('Error: '+(e.message||e)); }
}
async function rejectSub(id){
  const s=SUBMISSIONS.find(x=>x.id===id); if(!s) return;

  try{ if(LIVE){ await sb.from('pledge_submissions').update({status:'rejected'}).eq('id',id); }

// Re-render while keeping focus + cursor in the active search box (fixes cursor-loss on typing)
function searchInput(el, assign){
  assign(el.value);
  const pos=el.selectionStart;
  render();
  const again=document.querySelector('.search');
  if(again){ again.focus(); try{ again.setSelectionRange(pos,pos); }catch(e){} }
}

/* ===== TOTALS ===== */
function totals(){
  const pl=GUESTS.filter(g=>isPledger(g)&&tzs(g));
  const pledged=pl.reduce((s,g)=>s+(+g.pledged||0),0);
  const paid=pl.reduce((s,g)=>s+(+g.paid||0),0);
  return {pledged,paid,out:pledged-paid,nP:pl.length,n:GUESTS.length,
    paidN:pl.filter(g=>statusOf(g)==='paid').length,
    partN:pl.filter(g=>statusOf(g)==='partial').length,
    pendN:pl.filter(g=>statusOf(g)==='pledged').length};
}
function curTotals(cur){
  const pl=GUESTS.filter(g=>isPledger(g)&&g.currency===cur&&(g.source==='WhatsApp-Rwanda'||cur!=='TZS'));
  const pledged=pl.reduce((s,g)=>s+(+g.pledged||0),0);
  const paid=pl.reduce((s,g)=>s+(+g.paid||0),0);
  return {pledged,paid,out:pledged-paid,n:pl.length,rows:pl,
    paidN:pl.filter(g=>statusOf(g)==='paid').length,
    partN:pl.filter(g=>statusOf(g)==='partial').length,
    pendN:pl.filter(g=>statusOf(g)==='pledged').length};
}
function bySource(){
  const m={};
  GUESTS.filter(g=>isPledger(g)&&tzs(g)).forEach(g=>{const k=g.source||'Main'; m[k]=m[k]||{exp:0,rec:0,n:0}; m[k].n++; m[k].exp+=+g.pledged||0; m[k].rec+=+g.paid||0;});
  return m;
}
function budgetTotals(){
  const dmg=SPEND.find(s=>/damage|total/i.test(s.item));
  const totalCost=dmg?dmg.budget:SPEND.reduce((s,x)=>s+(+x.budget||0),0);
  const t=totals();
  return {totalCost,gapBest:totalCost-t.pledged,gapWorst:totalCost-t.paid};
}
function byCategory(){
  const m={};
  GUESTS.forEach(g=>{const k=g.category||'Uncategorized'; m[k]=m[k]||{exp:0,rec:0,n:0,pl:0}; m[k].n++; m[k].exp+=+g.pledged||0; m[k].rec+=+g.paid||0; if(isPledger(g))m[k].pl++;});
  return Object.entries(m).filter(([k,v])=>v.exp>0).sort((a,b)=>b[1].exp-a[1].exp);
}
function byChannel(){
  const m={};
  GUESTS.forEach(g=>{ if((+g.paid||0)>0){const k=g.channel||'Unknown'; m[k]=(m[k]||0)+(+g.paid||0);}});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function byHandler(){
  const m={};
  GUESTS.forEach(g=>{const k=g.handler||'Unassigned'; m[k]=m[k]||{exp:0,rec:0,n:0}; m[k].n++; m[k].exp+=+g.pledged||0; m[k].rec+=+g.paid||0;});
  return Object.entries(m).sort((a,b)=>b[1].rec-a[1].rec);
}

/* ===== GRAND TOTAL / FX ===== */
// Rates default to the values you provided; auto-updated from a free API on load if available.
let FX = { rwf: 1.7876, usd: 2632.21, source: 'manual', when: '' };
async function loadRates(){
  try{
    // free, no-key, browser-allowed endpoint (base = TZS)
    const res = await fetch('https://open.er-api.com/v6/latest/TZS');
    const d = await res.json();
    if(d && d.rates && d.rates.RWF && d.rates.USD){
      // API gives how many RWF per 1 TZS; we want TZS per 1 RWF -> invert
      FX.rwf = 1 / d.rates.RWF;
      FX.usd = 1 / d.rates.USD;
      FX.source = 'live';
      FX.when = d.time_last_update_utc || new Date().toUTCString();
      if(curView==='exchange') document.getElementById('content').innerHTML=viewExchange();
    }
  }catch(e){ /* keep manual defaults if fetch blocked */ }
}
function setRate(which,val){ FX[which]=parseFloat(val)||0; FX.source='manual (edited)'; if(curView==='exchange') document.getElementById('content').innerHTML=viewExchange(); }
function viewExchange(){
  const tz=totals(), rw=curTotals('RWF'), us=curTotals('USD');
  const fmt=n=>Math.round(n).toLocaleString('en-US');
  // TZS-equivalents
  const rwPaidTzs=rw.paid*FX.rwf, rwPledTzs=rw.pledged*FX.rwf;
  const usPaidTzs=us.paid*FX.usd, usPledTzs=us.pledged*FX.usd;
  const grandPaid = tz.paid + rwPaidTzs + usPaidTzs;
  const grandPled = tz.pledged + rwPledTzs + usPledTzs;
  const grandOut  = grandPled - grandPaid;
  const budget=budgetTotals().totalCost;
  const gap = budget - grandPaid;
  return `
  <div class="banner"><span>⇄</span><div>This page converts every currency into a <b>TZS-equivalent</b> so you can see one combined total. It's an <b>estimate</b> — the real money in each currency is fixed; only its TZS value shifts with the rate. Rates: <b>${FX.source}</b>${FX.when?' · '+FX.when:''}.</div></div>

  <div class="panel">
    <div class="panel-h"><h3>Exchange rates</h3><span class="sub">edit any rate to recalculate</span></div>
    <div class="grid-2" style="gap:14px;max-width:560px">
      <div class="field"><label>1 RWF = ? TZS</label><input type="number" step="0.0001" value="${FX.rwf.toFixed(4)}" onchange="setRate('rwf',this.value)"></div>
      <div class="field"><label>1 USD = ? TZS</label><input type="number" step="0.01" value="${FX.usd.toFixed(2)}" onchange="setRate('usd',this.value)"></div>
    </div>
    <p class="mini" style="margin-top:8px">Tip: check today's rate on Google ("1 RWF to TZS") and type it here if the auto-rate looks off.</p>
  </div>

  <div class="kpi-row">
    <div class="kpi k-teal"><div class="kpi-lbl">Grand total collected</div><div class="kpi-val">${fmt(grandPaid)}</div><div class="kpi-sub pos">TZS-equivalent</div></div>
    <div class="kpi k-butter"><div class="kpi-lbl">Grand total pledged</div><div class="kpi-val">${fmt(grandPled)}</div><div class="kpi-sub">TZS-equivalent</div></div>
    <div class="kpi k-coral"><div class="kpi-lbl">Outstanding</div><div class="kpi-val">${fmt(grandOut)}</div><div class="kpi-sub">still to collect</div></div>
    <div class="kpi k-deep"><div class="kpi-lbl">Gap vs budget</div><div class="kpi-val">${fmt(gap)}</div><div class="kpi-sub neg">of ${fmt(budget)} cost</div></div>
  </div>

  <div class="panel">
    <div class="panel-h"><h3>Breakdown by currency</h3><span class="sub">original amount → TZS-equivalent</span></div>
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Stream</th><th class="num">Collected (original)</th><th class="num">Collected (TZS-eq)</th><th class="num">Pledged (original)</th><th class="num">Pledged (TZS-eq)</th></tr></thead>
      <tbody>
        <tr><td><b>Tanzania</b> · TZS</td><td class="num">${fmt(tz.paid)}</td><td class="num">${fmt(tz.paid)}</td><td class="num">${fmt(tz.pledged)}</td><td class="num">${fmt(tz.pledged)}</td></tr>
        <tr><td><b>Rwanda</b> · RWF</td><td class="num">RWF ${fmt(rw.paid)}</td><td class="num">${fmt(rwPaidTzs)}</td><td class="num">RWF ${fmt(rw.pledged)}</td><td class="num">${fmt(rwPledTzs)}</td></tr>
        <tr><td><b>Diaspora</b> · USD</td><td class="num">$ ${fmt(us.paid)}</td><td class="num">${fmt(usPaidTzs)}</td><td class="num">$ ${fmt(us.pledged)}</td><td class="num">${fmt(usPledTzs)}</td></tr>
        <tr style="border-top:2px solid var(--line);font-weight:700"><td>Grand total</td><td class="num">—</td><td class="num">${fmt(grandPaid)}</td><td class="num">—</td><td class="num">${fmt(grandPled)}</td></tr>
      </tbody>
    </table></div>
  </div>`;
}

function viewDispatch(){
  const t=whatsappTotals();

  return `
  <div class="panel">
    <div class="panel-h"><h3>WhatsApp progress message</h3><span class="sub">${t.nP} WhatsApp-tagged contributors only</span></div>
    <p class="mini" style="margin-bottom:12px">This message includes <b>only the ${t.nP} people tagged as source = WhatsApp</b> (the list your sister tracks). Main-list and Rwanda contributors are excluded. WhatsApp can't post to groups automatically — copy this and send it yourself.</p>
    <div class="hcard" style="margin-bottom:14px">
      <div class="hc"><div class="hc-v">${money(t.paid)}</div><div class="hc-l">collected (${pct}%)</div></div>

    <textarea id="dispMsg" style="width:100%;height:300px;padding:14px;border:1px solid var(--line);border-radius:11px;font-family:monospace;font-size:12px;background:var(--cream);color:var(--ink)" readonly>${esc(buildDispatch())}</textarea>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-primary" onclick="copyDisp()">Copy message</button>
      <button class="btn btn-ghost" onclick="waShare()">Open WhatsApp</button>
    </div>
  </div>`;
}
function whatsappList(){
  return GUESTS.filter(g=>isPledger(g)&&tzs(g)&&(g.source||'Main')==='WhatsApp-TZ');
}
function whatsappTotals(){
  const pl=whatsappList();
  const pledged=pl.reduce((s,g)=>s+(+g.pledged||0),0);
  const paid=pl.reduce((s,g)=>s+(+g.paid||0),0);
  return {pledged,paid,out:pledged-paid,nP:pl.length,
    paidN:pl.filter(g=>statusOf(g)==='paid').length,
    partN:pl.filter(g=>statusOf(g)==='partial').length,
    pendN:pl.filter(g=>statusOf(g)==='pledged').length};
}
function buildDispatch(){
  const pl=whatsappList().slice().sort((a,b)=>{const ao=a.sort_order??9999,bo=b.sort_order??9999; if(ao!==bo)return ao-bo; return a.name.toLowerCase()<b.name.toLowerCase()?-1:1;});
  let s=`Karibuni kwenye group la maandalizi ya harusi ya ARNOLD BUKANGWA itakayofanyika 22 Aug 2026.\n\n`;
  s+=`Tafadhali tuma mchango wako kwa:\n\n`;
  s+=`Stanbic Bank: 9120003845239\nMixx by Yas: 0715123050\nSelcom Pesa/Mpesa: 0756444796\n\n`;
  s+=`Jina: Irene Mlaki\n\n`;
  s+=`Karibuni sana. Mungu awabariki kwa kujitoa kwenu 🙏🏽.\n\n`;
  s+=`Ahadi 🟣\nAmepunguza ☑️\nAmemaliza ✅✅\n\n`;
  pl.forEach((g,i)=>{
    const st=statusOf(g);
    let mk;
    if(st==='paid') mk='✅✅';
    else if(st==='partial') mk='☑️'+money(g.paid);
    else mk='🟣';
    s+=`${i+1}. ${g.name} ${money(g.pledged)}/-${mk}\n`;
  });
  return s;
}
function copyDisp(){ const el=document.getElementById('dispMsg'); el.select(); navigator.clipboard.writeText(el.value).then(()=>toast('Message copied')); }
function waShare(){ window.open('https://wa.me/?text='+encodeURIComponent(buildDispatch()),'_blank'); }

function dupWarn(){
  const seen={},dups=[];
  GUESTS.forEach(g=>{const k=g.name.trim().toLowerCase().replace(/\s+/g,''); if(seen[k])dups.push(g.name); else seen[k]=1;});
  if(!dups.length) return '<p class="mini" style="margin-top:12px;color:var(--teal)">✓ No duplicate names detected.</p>';
  return `<p class="mini" style="margin-top:12px;color:var(--coral)">⚠ Possible duplicates: ${dups.map(esc).join(', ')}</p>`;
}

  const cats=[...new Set(GUESTS.map(x=>x.category))].sort();
  document.getElementById('modalHost').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>${id?'Edit':'Add'} contributor</h3>
      <div class="field"><label>Name</label><input id="eName" value="${esc(g.name)}"></div>
      <div class="grid-2" style="gap:12px">
        <div class="field"><label>Category</label><select id="eCat">${(cats.includes(g.category)?cats:[g.category||'Uncategorized',...cats]).filter((v,i,a)=>a.indexOf(v)===i).map(c=>`<option ${g.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div>
        <div class="field"><label>Handler</label><select id="eHand"><option value="">—</option>${['Arnold','Mom','Dad','Irene','Dre'].map(h=>`<option ${g.handler===h?'selected':''}>${h}</option>`).join('')}</select></div>
      </div>
      <div class="grid-2" style="gap:12px">
        <div class="field"><label>Source list</label><select id="eSrc">${SOURCES.map(s=>`<option ${(g.source||'Main')===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Currency</label><select id="eCur"><option ${(g.currency||'TZS')==='TZS'?'selected':''}>TZS</option><option ${g.currency==='RWF'?'selected':''}>RWF</option><option ${g.currency==='USD'?'selected':''}>USD</option></select></div>
      </div>
      <div class="grid-2" style="gap:12px">
        <div class="field"><label>Pledged</label><input id="ePl" type="number" value="${+g.pledged||0}"></div>
        <div class="field"><label>Paid</label><input id="ePd" type="number" value="${+g.paid||0}"></div>
      </div>
      <div class="grid-2" style="gap:12px">
        <div class="field"><label>Channel <small class="mini">(On-hand = held by handler)</small></label><select id="eCh"><option value="">—</option>${['On-hand','MTN Momo','CRDB','Stanbic','Voda','Selcom','Mixx'].map(c=>`<option ${g.channel===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>Attending</label><select id="eAtt">${(()=>{const opts=['','Yes','No','Maybe'];const cur=g.attending||'';if(cur&&!opts.includes(cur))opts.push(cur);return opts.map(o=>`<option value="${esc(o)}" ${cur===o?'selected':''}>${o||'—'}</option>`).join('');})()}</select></div>
      </div>

        <button class="btn btn-primary" onclick="saveEdit(${id||0})">Save</button>
      </div>
    </div>
  </div>`;
}
function closeModal(){ document.getElementById('modalHost').innerHTML=''; }
async function saveEdit(id){
  const g={ name:document.getElementById('eName').value.trim(), category:document.getElementById('eCat').value.trim()||'Uncategorized',
    handler:document.getElementById('eHand').value, pledged:+document.getElementById('ePl').value||0,
    paid:+document.getElementById('ePd').value||0, channel:document.getElementById('eCh').value, attending:document.getElementById('eAtt').value.trim(), source:document.getElementById('eSrc').value, currency:document.getElementById('eCur').value };
  if(!g.name){ toast('Name required'); return; }
  if(g.paid>g.pledged) g.paid=g.pledged;
  if(id) g.id=id;
  try{ await saveGuest(g); closeModal(); buildNav(); render(); toast('Saved'); }
  catch(e){ toast('Error: '+(e.message||e)); }
}
async function delGuest(id){
  if(!confirm('Delete this contributor?')) return;
  try{ await deleteGuest(id); closeModal(); buildNav(); render(); toast('Deleted'); }
  catch(e){ toast('Error: '+(e.message||e)); }
}

/* ===== EXPORT ===== */
function exportCSV(){
  const pl=GUESTS.filter(isPledger);
  const rows=[['Name','Category','Handler','Pledged','Paid','Outstanding','Status','Channel']];
  pl.forEach(g=>rows.push([g.name,g.category,g.handler,g.pledged,g.paid,(+g.pledged-+g.paid),statusOf(g),g.channel]));
  const csv=rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl(csv,'mchango_contributors.csv','text/csv');
}
function exportJSON(){ dl(JSON.stringify({guests:GUESTS,spend:SPEND},null,2),'mchango_backup.json','application/json'); }
function dl(content,name,type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

/* ===== TOAST ===== */
function toast(msg){ let el=document.getElementById('toast'); if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--deep);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.25)';document.body.appendChild(el);} el.textContent=msg; el.style.opacity='1'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',1800); }
